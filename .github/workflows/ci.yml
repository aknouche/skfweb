name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Lint, Audit & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so Next.js build doesn't fail on missing env vars
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID || 'build-placeholder' }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET || 'production' }}
          NEXT_PUBLIC_SANITY_API_VERSION: '2024-01-01'
          REVALIDATION_SECRET: 'ci-placeholder-secret'
          RESEND_API_KEY: 'ci-placeholder-key'
          RESEND_FROM_EMAIL: 'noreply@example.com'
          RESEND_TO_EMAIL: 'info@example.com'
